<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Attributes</title>
</head>
<body>
    <h2>Anchor Tag</h2>
    <a href="https://google.co.in" target="_blank" title=“Go to Google”> Google </a>
    <br><br>
    <hr>
    <br><br>

    <h2>Image Tag</h2>
    <img src="https://www.jiomart.com/images/product/original/rvdgkclsyi/paryavaraan-tulip-double-mix-attractive-flower-bulbs-for-spring-to-winter-season-pack-of-2-bulbs-product-images-orvdgkclsyi-p606535356-1-202312051257.jpg?im=Resize=(420,420)" alt="Tulip Flower" width="500" height="500">
    <br><br>
    <hr>
    <br><br>

    <h2>Style Tag</h2>
    <p style="color:red;">This is a red paragraph.</p>
</body>
</html>
