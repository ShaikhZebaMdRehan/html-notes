<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Lists</title>
</head>
<body>
      <h1>Ordered Lists</h1>
      <ol type="A">
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
        <li>Lichi</li>
        <li>Watermelon</li>
      </ol>

      <h1>Unordered Lists</h1>
      <ul style="list-style-type: square;">
         <li>Apple</li>
         <li>Mango</li>
         <li>Orange</li>
         <li>Lichi</li>
         <li>Watermelon</li>
      </ul>

      <h1>Description Lists</h1>
      <dl>
         <dt>1. Apple</dt>
         <dd>- Apple is in red colour</dd>
         <dt>2. Mango</dt>
         <dd>- Mango is in yellow colour</dd>
      </dl>
</body>
</html>
