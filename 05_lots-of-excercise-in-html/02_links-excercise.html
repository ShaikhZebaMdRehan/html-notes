<!-- Q] Hyperlink Exercise
1. Write the text “Click here to open Google”
2. Create a hyperlink on the word “Google” that opens google.co.in website in a new tab.
3. The website should open in a new tab
4. When the mouse hovers over the link, it should display the message “Google is one of the most popular search engines.”
5. Create another hyperlink with the text “Download PDF”

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 02 Links</title>
</head>
<body>
    <p>Click here to open <a href="https://google.co.in" target="_blank" title="Google is one of the most popular search engines.">Google</a></p>

    <h2>Download Attribute</h2>
    <a href="/chapters-in-html/02_what-we-learn-in-html.jpg" download="pdf">learn-in-html</a>
