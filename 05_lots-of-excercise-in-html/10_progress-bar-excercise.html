<!-- +++++++++++++++ Exercise 10 +++++++++++++++ -->

<!-- Q] Subject Progress Bars Exercise
1. Create a section to display subject progress bars.
2. Add a labeled progress bar for each subject: English – 80%, Maths – 70%,Science – 55%, Social Science – 75%, Hindi – 65%, Marathi – 45%, Computer – 60%
3. Each progress bar shows the completion status according to its percentage. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10 Subject Progress Bar</title>
</head>
<body>
    <h2>Subject Progress Bar</h2>
    <div>
        <label for="english">English - 80%</label>
        <progress id="english" value="80" max="100"></progress>
    </div>

    <br>

    <div>
        <label for="maths">Maths - 70%</label>
        <progress id="maths" value="70" max="100"></progress>
    </div>

    <br>

    <div>
        <label for="science">Science - 55%</label>
        <progress id="science" value="55" max="100"></progress>
    </div>

    <br>

    <div>
        <label for="social-science">Social Science - 75%</label>
        <progress id="social-science" value="75" max="100"></progress>
    </div>

    <br>

    <div>
        <label for="hindi">Hindi - 65%</label>
        <progress id="hindi" value="65" max="100"></progress>
    </div>

    <br>

    <div>
        <label for="marathi">Marathi - 45%</label>
        <progress id="marathi" value="45" max="100"></progress>
    </div>

    <br>

    <div>
        <label for="computer">Computer - 60%</label>
        <progress id="computer" value="60" max="100"></progress>
    </div>

</body>
</html>
