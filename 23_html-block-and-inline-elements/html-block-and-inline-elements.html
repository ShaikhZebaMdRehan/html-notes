<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span</title>
    <style>
        .container1 {
            background-color: black;
            color: aliceblue;
            padding: 10px 20px;
            margin-bottom: 30px;
        }

        .container2 {
            background-color: beige;
            padding: 10px 20px;
        }

        .cls1 {
            background-color: black;
            color: yellow;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container1">
        <h1>Heading</h1>
        <ul>
            <li>List Item</li>
            <li>List Item</li>
            <li>List Item</li>
            <li>List Item</li>
            <li>List Item</li>
            <li>List Item</li>
        </ul>
    </div>

    <div class="container2">
        <h1>Heading <span class="cls1">Two</span></h1>
        <img src="./chapters-in-html/02_what-we-learn-in-html.jpg" alt="Learn-In-HTML" width="500px" height="auto">
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Omnis, aliquam ab. Iusto, dignissimos? Optio error culpa voluptatem aliquid et id.</p>
    </div>
</body>
</html>
