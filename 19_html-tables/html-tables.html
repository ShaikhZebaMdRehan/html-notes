<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <table border="1">
        <caption>Student Table</caption>
        <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Harshit</td>
            <td>Vashistha</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Mohit</td>
            <td>Sharma</td>
            <td>15</td>
        </tr>
    </tbody>
    </table>
</body>
</html>
