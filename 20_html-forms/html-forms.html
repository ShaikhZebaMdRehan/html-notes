<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <form action="./html-thankyou-form.html" method="get" style="text-align: center;">
        <fieldset style="border-color: #000;">
            <legend style="font-weight: bold; text-align: center; font-size: 30px; margin: 20px; background-color: #b4b4b4; color: #000; padding: 10px;">Sign Up Form</legend>

            <label for="first-name">First Name: </label>
            <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required>
            <br><br>

            <label for="last-name">Last Name: </label>
            <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required>
            <br><br>

            <label for="mobile-number">Mobile Number:</label>
            <input type="tel" id="mobile-number" name="mobile-number" placeholder="Your Mobile Number" required>
            <br><br>

            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="Write your email" required>
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Write your password" required>
            <br><br>

            <p>Select your gender: </p>
            <label for="male">Male</label>
            <input type="radio" id="male" name="Gender" value="Male" required>

            <label for="female">Female</label>
            <input type="radio" id="female" name="Gender" value="Female" required>

            <label for="other">Other</label>
            <input type="radio" id="other" name="Gender" value="Other" required>
            <br><br>

            <!-- Checkbox -->
            <label for="age-group">Select your age: </label>
            <select name="age-group" id="age-group">
                <option value="1-10">1-10</option>
                <option value="11-20">11-20</option>
                <option value="21-30">21-30</option>
                <option value="31-40">31-40</option>
                <option value="41-50">41-50</option>
                <option value="50+">50+</option>
            </select>
            <br><br>

            <!-- Datalist -->
            <label for="county">Select your Country: </label>
            <input list="country">
            <datalist id="country">
                <option value="India">India</option>
                <option value="America">America</option>
                <option value="London">London</option>
                <option value="Africa">Africa</option>
                <option value="Australia">Australia</option>
                <option value="Canada">Canada</option>
            </datalist>
            <br><br>

            <label for="about-yourself">Write about yourself below:</label>
            <textarea id="about-yourself" name="about-yourself" cols="30" rows="3" placeholder="Type here...." required></textarea>
            <br><br>

            <input type="reset" value="Reset" style="margin-right: 10px;">

            <input type="submit" value="Submit">
        </fieldset>
    </form>
</body>
</html>
